name: Run APEX Backtests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/run-backtests.yml"
      - "src/feature_sets.py"
      - "src/pipeline.py"
      - "src/download_source_data.py"
      - "src/improve.py"
      - "src/add_conservative_scores.py"
      - "src/build_site.py"
      - "src/template.html"
      - "src/backtest.py"
      - "src/position_models.py"
      - "src/sweep_apex_factor.py"
      - "src/nested_factor_backtest.py"
      - "src/position_ensemble_backtest.py"
      - "src/predraft_market.py"
      - "src/predraft_backtest.py"
      - "src/ablation_backtest.py"
      - "src/validation_gates.py"
      - "data/consensus/**"
      - "data/production/**"

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download and normalize public source data
        run: python src/download_source_data.py

      - name: Build profile-only public board with conservative scores
        run: |
          python src/improve.py \
            --feature-set profile \
            --end-year 2026
          python src/add_conservative_scores.py --factors "0.25,0.50,0.75"
          python src/build_site.py

      - name: Check pre-draft consensus scaffold
        run: python src/predraft_market.py --write-template --check

      - name: Run profile-only raw APEX backtest
        run: |
          python src/backtest.py \
            --first-test-year 2011 \
            --last-test-year 2021 \
            --end-year 2021 \
            --feature-set profile \
            --apex-plus-factor 3.5

      - name: Run APEX+ factor sweep
        run: |
          python src/sweep_apex_factor.py \
            --first-test-year 2011 \
            --last-test-year 2021 \
            --end-year 2021 \
            --factors "0,0.25,0.5,0.75,1,1.25,1.5,1.75,2,2.25,2.5,2.75,3,3.25,3.5"

      - name: Run nested conservative factor backtest
        run: |
          python src/nested_factor_backtest.py \
            --factor-by-year reports/apex_factor_sweep_by_year.csv \
            --min-history-years 4 \
            --allowed-factors "0,0.25,0.5,0.75,1.0"

      - name: Run position-specific profile-only challenger
        run: |
          python src/position_models.py \
            --first-test-year 2011 \
            --last-test-year 2021 \
            --end-year 2021 \
            --feature-set profile \
            --apex-plus-factor 3.5

      - name: Run position-weighted ensemble backtest
        run: |
          python src/position_ensemble_backtest.py \
            --first-test-year 2011 \
            --last-test-year 2021 \
            --end-year 2021 \
            --feature-set profile \
            --weights "0,0.25,0.5,0.75,1"

      - name: Run feature ablation backtests
        run: |
          python src/ablation_backtest.py \
            --first-test-year 2011 \
            --last-test-year 2021 \
            --end-year 2021

      - name: Run validation gates
        run: |
          python src/validation_gates.py reports/rolling_backtest_summary.csv --delta-col delta_raw_vs_pick_spearman_drafted --out reports/rolling_validation_gates.json
          python src/validation_gates.py reports/position_model_backtest_summary.csv --delta-col delta_raw_vs_pick_spearman_drafted --out reports/position_model_validation_gates.json
          python src/validation_gates.py reports/position_ensemble_backtest_summary.csv --delta-col delta_ensemble_vs_pick_spearman_drafted --out reports/position_ensemble_validation_gates.json
          python src/validation_gates.py reports/nested_factor_backtest_summary.csv --delta-col delta_nested_vs_pick_spearman_drafted --out reports/nested_factor_validation_gates.json

      - name: Commit generated site files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html docs/index.html data/apex_board.csv
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
          else
            git commit -m "Update generated APEX site"
            git push
          fi

      - name: Show report summaries
        if: always()
        run: |
          echo "=== rolling_backtest_report.json ==="
          cat reports/rolling_backtest_report.json || true
          echo "=== apex_factor_sweep_report.json ==="
          cat reports/apex_factor_sweep_report.json || true
          echo "=== apex_factor_sweep_summary.csv ==="
          cat reports/apex_factor_sweep_summary.csv || true
          echo "=== nested_factor_backtest_report.json ==="
          cat reports/nested_factor_backtest_report.json || true
          echo "=== position_model_backtest_report.json ==="
          cat reports/position_model_backtest_report.json || true
          echo "=== position_ensemble_backtest_report.json ==="
          cat reports/position_ensemble_backtest_report.json || true
          echo "=== feature_ablation_summary.csv ==="
          cat reports/feature_ablation_summary.csv || true
          echo "=== predraft_market_status.json ==="
          cat reports/predraft_market_status.json || true
          echo "=== validation gates ==="
          cat reports/rolling_validation_gates.json || true
          cat reports/position_model_validation_gates.json || true
          cat reports/position_ensemble_validation_gates.json || true
          cat reports/nested_factor_validation_gates.json || true

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-backtest-reports
          path: |
            reports/*.json
            reports/*.csv
            data/draft_data.csv
            data/combine_data_pfr_with_stats.csv
            data/apex_board.csv
            data/consensus/*.csv
            data/production/*.csv
            index.html
            docs/index.html
            docs/validation.html
            docs/ablation.html
          if-no-files-found: warn
